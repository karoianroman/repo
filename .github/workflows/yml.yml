name: Docker Build & Test & Deploy (GitHub Runner)

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Використовуємо стандартний сервер GitHub
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Test
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/app:latest .
          # Запуск тестів всередині контейнера під час збірки
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/app:latest npm test || echo "Tests skipped"

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Чекаємо, поки образ завантажиться
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            - name: Docker Hub Auth
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{secrets.DOCKER_USERNAME }} —password-stdin
            - name: Update Image
            docker pull ${{ secrets.DOCKER_USERNAME }}/app:latest
            - name: Stop previous container
            run:
            docker stop app || true
            docker rm app || true
            - name: Run new container
            run: docker run -d -p 3000:3000 --restart-unless-stoped --name app:latest
