name: Docker Build & Test & Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Build image
      run: docker build -t app:latest .
      
    - name: Run unit tests
      run: docker run --rm app:latest npm test  # якщо у Node.js є тести
      
    - name: Remove old test container
      run: |
        docker stop app_new || true
        docker rm app_new || true

    - name: Run new test container
      run: docker run -d -p 3001:3000 --name app_new app:latest

    - name: Wait for app
      run: sleep 5

    - name: Health check
      run: curl -f http://localhost:3001

    - name: Stop old container
      run: |
        docker stop app || true
        docker rm app || true

    - name: Start production container
      run: |
        docker run -d -p 3000:3000 --name app app:latest --restart unless-stopped my-ap
        
    - name: Remove test container
      run: |
        docker stop app_new || true
        docker rm app_new || true

    - name: Cleanup Docker
      run: docker system prune -af
