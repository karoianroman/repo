name: Docker Build & Push

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:latest .

      - name: Run unit tests
        run: docker run --rm app:latest npm test  # якщо у Node.js є тести

      - name: Stop previous container
        run: |
          docker stop app || true
          docker rm app || true

      - name: Run new container
        run: docker run -d -p 3000:3000 --name app app:latest
