name: Docker Build & Push & VM Deploy

on:
  push:
    branches: [ main ]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: europe-west1
  GAR_REPO: repo-repository
  IMAGE_NAME: app
  VM_NAME: instance-20260317-080055      # Назва вашої VM в Google Cloud
  VM_ZONE: europe-west1-d         # Зона вашої VM

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push
        run: |
          IMAGE_PATH=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:latest
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH

  deploy-to-vm:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM via SSH Command
        run: |
          IMAGE_PATH=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:latest
          
          # Використовуємо gcloud compute ssh для виконання команд на VM
          gcloud compute ssh ${{ env.VM_NAME }} --zone=${{ env.VM_ZONE }} --tunnel-through-iap --command="
            # Авторизація Docker на самій VM (використовує права акаунта VM)
            gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet
            
            # Оновлення та перезапуск
            docker pull $IMAGE_PATH
            docker stop ${{ env.IMAGE_NAME }} || true
            docker rm ${{ env.IMAGE_NAME }} || true
            
            docker run -d \
              --name ${{ env.IMAGE_NAME }} \
              -p 3000:3000 \
              --restart unless-stopped \
              $IMAGE_PATH
            
            docker image prune -f
          "
