name: CI/CD → Google Artifact Registry

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCR_HOSTNAME: europe-west1-docker.pkg.dev
  # ⚠️ Тут ми прибрали PROJECT_ID, залишивши тільки назву репозиторію та образу
  IMAGE_NAME: app/app
  REGION: europe-west1                        # регіон Cloud Run (якщо використовується)
  SERVICE_NAME: app-service                   # назва сервісу Cloud Run

jobs:
  # ─────────────────────────────────────────
  # 1. Тести
  # ─────────────────────────────────────────
  test:
    name: 🧪 Тести
    runs-on: ubuntu-latest

    steps:
      - name: Отримати код
        uses: actions/checkout@v4

      - name: Налаштувати Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Встановити залежності
        run: npm ci

      - name: Запустити тести
        run: npm test

      - name: Запустити лінтер
        run: npm run lint

  # ─────────────────────────────────────────
  # 2. Збірка та пуш в Artifact Registry
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Збірка та пуш в Artifact Registry
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_latest: ${{ steps.meta.outputs.image_latest }}
      is_main: ${{ steps.meta.outputs.is_main }}

    steps:
      - name: Отримати код
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Налаштувати Docker для GCP
        run: gcloud auth configure-docker ${{ env.GCR_HOSTNAME }} --quiet

      # 🔥 Тут ми виправляємо регістр PROJECT_ID і збираємо правильний шлях
      - name: Згенерувати метадані образу
        id: meta
        run: |
          # Переводимо PROJECT_ID в нижній регістр про всяк випадок
          LOWER_PROJECT=$(echo "${{ env.PROJECT_ID }}" | tr '[:upper:]' '[:lower:]')
          
          SHORT_SHA=${GITHUB_SHA::8}
          BRANCH=${GITHUB_REF_NAME//\//-}
          
          # Формуємо базовий шлях БЕЗ дублювання PROJECT_ID
          BASE_IMAGE="${{ env.GCR_HOSTNAME }}/$LOWER_PROJECT/${{ env.IMAGE_NAME }}"
          
          echo "image_base=$BASE_IMAGE" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "image_tag=${BASE_IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "image_latest=${BASE_IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${BASE_IMAGE}:${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Зібрати Docker-образ
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.image_tag }}" \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg VCS_REF=${{ github.sha }} \
            .

      - name: Позначити як latest (тільки гілка main)
        if: steps.meta.outputs.is_main == 'true'
        run: |
          docker tag \
            "${{ steps.meta.outputs.image_tag }}" \
            "${{ steps.meta.outputs.image_latest }}"

      - name: Запушити образ в Artifact Registry
        run: |
          docker push "${{ steps.meta.outputs.image_tag }}"
          if [[ "${{ steps.meta.outputs.is_main }}" == "true" ]]; then
            docker push "${{ steps.meta.outputs.image_latest }}"
          fi

    # ─────────────────────────────────────────
  # 3. Деплой у Cloud Run (тільки main)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Деплой у Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Автентифікація у Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Задеплоїти у Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          # 🔥 ПРЯМЕ ФОРМУВАННЯ ШЛЯХУ (замість outputs):
          image: ${{ env.GCR_HOSTNAME }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated'

      - name: Вивести URL задеплоєного сервісу
        run: echo "✅ Задеплоєно на ${{ steps.deploy.outputs.url }}"
