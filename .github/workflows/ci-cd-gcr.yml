name: CI/CD → Google Artifact Registry (Простий)

on:
  push:
    branches: [ main, develop ]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: app-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # 1. Етап Тестування
  # ─────────────────────────────────────────
  test:
    name: 🧪 Тести
    runs-on: ubuntu-latest
    steps:
      - name: Отримати код
        uses: actions/checkout@v4

      - name: Налаштувати Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Встановити залежності та протестувати
        run: |
          npm ci
          npm test

  # ─────────────────────────────────────────
  # 2. Етап Збірки та Пушу (тільки для push)
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Збірка та Пуш
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Отримати код
        uses: actions/checkout@v4

      - name: Авторизація в Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Налаштувати Docker для GCP
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Зібрати та запушити Docker-образ
        run: |
          # Використовуємо один залізобетонний тег: повний SHA коміту
          IMAGE_TAG="europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/app/app:${{ github.sha }}"
          
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

  # ─────────────────────────────────────────
  # 3. Етап Деплою (тільки для гілки main)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Деплой у Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Авторизація в Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Задеплоїти у Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          # Тут вказуємо ТОЧНО той самий шлях, що й у збірці зверху
          image: europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/app/app:${{ github.sha }}
          flags: '--allow-unauthenticated'

      - name: Вивести URL
        run: echo "✅ Задеплоєно на ${{ steps.deploy.outputs.url }}"