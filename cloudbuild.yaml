steps:
  # 1. Збірка образу
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/my-repo/my-app', '.']

  # 2. Пуш образу в Artifact Registry (без цього деплой не знайде файл)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/my-repo/my-app']

  # 3. Оновлення сервісу Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'repo'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/my-repo/my-app'
      - '--region'
      - 'europe-west1'

options:
  logging: CLOUD_LOGGING_ONLY
